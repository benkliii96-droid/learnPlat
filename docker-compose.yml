version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: code_learning_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # замените на надежный пароль
      POSTGRES_DB: code_learning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: code_learning_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres  # должно совпадать с POSTGRES_PASSWORD
      DB_NAME: code_learning
      JWT_SECRET: your-secret-key-change-in-production  # обязательно смените!
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: code_learning_frontend
    ports:
      - "80:80"  # внешний порт 80 -> внутренний 80
    depends_on:
      - backend

volumes:
  postgres_data: